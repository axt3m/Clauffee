name: Release

# Builds and packages Clauffee, then uploads Clauffee-<version>.zip as a
# workflow ARTIFACT (downloadable from the run page) — it does NOT touch
# GitHub Releases. Releases are published by hand: create the release, write
# the notes, and attach the zip yourself (grab it here or build locally).
# Runs on any `v*` tag push (to verify the tagged commit compiles) and on
# manual dispatch. No Apple Developer account or secrets required — the app is
# ad-hoc signed and NOT notarized, so first launch needs right-click -> Open.
on:
  push:
    tags:
      - "v*"
  pull_request:
    branches: [main]      # build every PR into main → gives a status check
  workflow_dispatch: {}   # allow manual runs from the Actions tab

permissions:
  contents: read           # build/verify only — never writes Releases

jobs:
  build:
    runs-on: macos-15      # GitHub-hosted macOS runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build & package
        run: ./scripts/build-release.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Clauffee-app
          path: dist/*.zip
